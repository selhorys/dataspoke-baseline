# DataHub prerequisites Helm values — dev sizing
# Chart: datahub/datahub-prerequisites version 0.2.1
# Target cluster: 8 CPU / 14 GB RAM
# All components use replicaCount: 1 for minimal resource usage.
# Total memory limits (prerequisites): ~3.3 GiB of ~7 GiB cluster-wide budget

# Bitnami Kafka (replaces cp-kafka)
kafka:
  enabled: true
  broker:
    replicaCount: 1
    resources:
      requests:
        cpu: "200m"
        memory: "256Mi"
      limits:
        cpu: "1000m"
        memory: "512Mi"
    extraConfig: |
      message.max.bytes=5242880
      default.replication.factor=1
      offsets.topic.replication.factor=1
      transaction.state.log.replication.factor=1
  kraft:
    enabled: false
  # Listeners: CLIENT (9092) for in-cluster DataHub components, INTERNAL (9094)
  # for inter-broker, EXTERNAL (9095) for host-side port-forwarded access.
  # advertisedListeners must include the namespace matching the Helm install
  # target (DATASPOKE_DEV_KUBE_DATAHUB_NAMESPACE in .env, default: datahub-01).
  listeners:
    client:
      protocol: PLAINTEXT
    interbroker:
      protocol: PLAINTEXT
    external:
      containerPort: 9095
      protocol: PLAINTEXT
      name: EXTERNAL
    overrideListeners: "CLIENT://:9092,INTERNAL://:9094,EXTERNAL://:9095"
    securityProtocolMap: "CLIENT:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
    # yamllint disable-line rule:line-length
    advertisedListeners: "CLIENT://datahub-prerequisites-kafka-broker-0.datahub-prerequisites-kafka-broker-headless.datahub-01.svc.cluster.local:9092,INTERNAL://datahub-prerequisites-kafka-broker-0.datahub-prerequisites-kafka-broker-headless.datahub-01.svc.cluster.local:9094,EXTERNAL://localhost:9005"
  # Bitnami ZooKeeper (subchart of kafka)
  zookeeper:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

# Confluent Platform is disabled (bitnami kafka used instead)
cp-helm-charts:
  enabled: false
  cp-schema-registry:
    enabled: false

# Elasticsearch
# ES needs ~512m JVM heap + ~1.5 GB off-heap (Lucene segment cache, network
# buffers, plugin loading, index recovery).  2Gi OOM-killed during concurrent
# startup with Kafka/MySQL; 2.5Gi gives stable headroom.
elasticsearch:
  enabled: true
  replicas: 1
  minimumMasterNodes: 1
  antiAffinity: "soft"
  clusterHealthCheckParams: "wait_for_status=yellow&timeout=1s"
  esJavaOpts: "-Xmx512m -Xms512m"
  resources:
    requests:
      cpu: "200m"
      memory: "1536Mi"
    limits:
      cpu: "1000m"
      memory: "2560Mi"

# Bitnami MySQL
mysql:
  enabled: true
  auth:
    existingSecret: "mysql-secrets"
    # Secret must contain keys: mysql-root-password, mysql-password
  primary:
    extraFlags: "--character-set-server=utf8mb4 --collation-server=utf8mb4_bin"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "768Mi"
    persistence:
      enabled: false
    # Relaxed probes for resource-constrained dev cluster
    startupProbe:
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 15
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5

# Neo4j disabled — using Elasticsearch as graph backend (upstream default)
neo4j:
  enabled: false
